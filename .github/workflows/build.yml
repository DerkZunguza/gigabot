name: Build Bot Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/derkzunguza/mb-bot

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./bot
          push: true
          tags: ${{ env.IMAGE }}:latest
